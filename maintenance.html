<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Down for Maintenance — Expert Consult</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #131c22;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 480px;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #fe4534;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        p {
            color: #aaa;
            font-size: 1rem;
            line-height: 1.6;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: #fe4534;
            margin: 1.5rem auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Expert Consult</div>
        <h1>We'll be back shortly.</h1>
        <div class="divider"></div>
        <p>The site is currently undergoing scheduled maintenance.<br>We apologise for any inconvenience.</p>
    </div>
</body>
</html>
